id: "momentum"
description: "MACD crossover momentum - ride strong trends with volume confirmation"

indicators:
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  roc_period: 10             # Rate of Change lookback bars
  rsi_period: 14
  atr_period: 14

signals:
  min_roc_pct: 2.0           # minimum 2% price change over roc_period
  volume_multiplier: 1.2     # volume must be 1.2x the 20-bar average
  require_volume: true
  rsi_min: 40                # don't buy if RSI already overbought
  rsi_max: 75
  min_histogram_pct: 0.001   # histogram must be >= 0.1% of price

tokens:
  - "ETH"
  - "cbBTC"
  - "BTC"

rules:
  min_confidence: 0.65
  base_amount_usd: 75
  max_amount_usd: 300
  sell_pct_of_position: 60
