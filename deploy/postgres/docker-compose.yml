version: '3.9'
services:
  arena-postgres:
    image: postgres:16
    container_name: arena-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: arena
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: arena_dev_password
    ports:
      - "5432:5432"
    volumes:
      - arena_postgres_data:/var/lib/postgresql/data

volumes:
  arena_postgres_data:

