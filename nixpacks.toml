[phases.setup]
nixPkgs = ["nodejs_20", "pnpm", "python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "pnpm install --frozen-lockfile",
  "pip3 install --break-system-packages numpy==1.26.4 --only-binary=:all:",
  "pip3 install --break-system-packages pandas ta python-dotenv pydantic pyyaml anthropic openai google-generativeai --only-binary=:all:"
]

[phases.build]
cmds = ["pnpm -r build"]
